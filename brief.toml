[project]
name = "brief"
version = "1.0.0"
authors = ["Brief Contributors"]

# ── Verification settings ─────────────────────────────────────────────────────
# require_lock = false lets `brief check` pass without a .brief.lock file.
# Useful in CI and development. Set to true in production workflows.
[verify]
require_lock = false

# ── Builtin verifiers ─────────────────────────────────────────────────────────
[verifiers."@url"]
skill = "builtin:url"

[verifiers."@local-path"]
skill = "builtin:local-path"

[verifiers."@github-repo"]
skill = "builtin:github-repo"

[verifiers."@shell-command"]
skill = "builtin:shell-command"

# ── Compiler skills ───────────────────────────────────────────────────────────
[skills.CheckerPrimitives]
path = "compiler/skills/CheckerPrimitives"

[skills.LexerPrimitives]
path = "compiler/skills/LexerPrimitives"

[skills.ParserPrimitives]
path = "compiler/skills/ParserPrimitives"

[skills.FormatterPrimitives]
path = "compiler/skills/FormatterPrimitives"

[skills.HirPrimitives]
path = "compiler/skills/HirPrimitives"

[skills.CompilerDriver]
path = "compiler/skills/CompilerDriver"

# ── Reference skill paths (used by CI examples) ──────────────────────────────
[skills.GitHub]
path = "examples/skills/GitHub"

[skills.FileSystem]
path = "examples/skills/FileSystem"

[skills.WebSearch]
path = "examples/skills/WebSearch"

[skills.Memory]
path = "examples/skills/Memory"

[skills.Shell]
path = "examples/skills/Shell"

[ci]
examples = [
  "examples/*.brief",
  "compiler/01-lex-pass.brief",
  "compiler/02-parse-pass.brief",
  "compiler/03-check-pass.brief",
  "compiler/04-fmt-pass.brief",
  "compiler/05-hir-pass.brief",
  "compiler/06-pipeline.brief",
]
