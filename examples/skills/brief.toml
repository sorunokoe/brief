// Example brief.toml for a project using FileSystem + WebSearch skills.
// Copy to your project root as brief.toml and adjust paths.

[project]
name    = "my-brief-project"
version = "0.1.0"

# ── Skills ────────────────────────────────────────────────────────────────────
# Each skill needs an mcp_command or mcp_url pointing to its MCP server.

[skills.FileSystem]
# Run as: npx @brief/filesystem-skill (or replace with your own server)
mcp_command = ["npx", "-y", "@brief/filesystem-skill"]

[skills.GitHub]
mcp_command = ["npx", "-y", "@modelcontextprotocol/server-github"]

[skills.WebSearch]
mcp_command = ["npx", "-y", "@modelcontextprotocol/server-brave-search"]

[skills.Memory]
mcp_command = ["npx", "-y", "@modelcontextprotocol/server-memory"]

[skills.Shell]
mcp_command = ["npx", "-y", "@brief/shell-skill"]

# ── Verifiers ─────────────────────────────────────────────────────────────────
# Configure a verifier for each @annotation used in .briefskill files.
# brief check (E309) will warn if an annotation has no verifier.

[verifiers."@url"]
# Ships with Brief — validates http/https URLs are reachable.
skill = "builtin:url"

[verifiers."@local-path"]
# Verify local file paths exist and are readable.
# Install: npm i -g @brief/local-path-verifier
mcp_command = ["npx", "-y", "@brief/local-path-verifier"]

[verifiers."@github-repo"]
# Verify GitHub repos are accessible (uses GITHUB_TOKEN).
# Install: npm i -g @brief/github-verifier
mcp_command = ["npx", "-y", "@brief/github-verifier"]

[verifiers."@shell-command"]
# Verify commands exist in PATH.
# Install: npm i -g @brief/shell-verifier
mcp_command = ["npx", "-y", "@brief/shell-verifier"]

# ── Verification settings ─────────────────────────────────────────────────────
[verify]
# Locks expire after 24 hours (default). Increase for stable environments.
max_lock_age_hours = 24

# ── CI ─────────────────────────────────────────────────────────────────────────
[ci]
examples = [
    "examples/skills/FileSystem/TransformFile.brief",
    "examples/skills/WebSearch/ResearchTopic.brief",
]
