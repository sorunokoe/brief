[book]
title       = "Brief — Language & Toolchain"
authors     = ["Brief Contributors"]
description = "If it compiles, the AI has everything it needs."
language    = "en"
src         = "book/src"

[build]
build-dir = "_book"

[output.html]
site-url         = "/"
git-repository-url = "https://github.com/sorunokoe/brief"
edit-url-template = "https://github.com/sorunokoe/brief/edit/main/book/src/{path}"
no-section-label = false
fold.enable      = true
fold.level       = 1

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30

[preprocessor.links]
